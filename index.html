<!doctype html>
<html lang="bn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Admin - Pro Gallery Controller</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --main: #0084ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
        .stage { width: 100%; height: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .local-box { position: absolute; top: 15px; right: 15px; width: 100px; height: 140px; border-radius: 12px; border: 2px solid var(--main); overflow: hidden; z-index: 10; background: #111; }
        #localVideo { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.9); backdrop-filter: blur(15px); padding: 12px; border-radius: 30px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; border: 1px solid rgba(255,255,255,0.1); z-index: 100; max-width: 95vw; }
        .btn { width: 40px; height: 40px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; background: rgba(255,255,255,0.1); font-size: 14px; }
        .btn.active { background: var(--main); }
        .btn.gallery { background: #34c759; }
        .btn.danger { background: #ff3b30; }
        .header-info { position: absolute; top: 15px; left: 15px; z-index: 20; display: flex; flex-direction: column; gap: 5px; }
        .info-tag { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; font-size: 11px; border: 1px solid var(--main); }
        .pin-tag { background: #ff9500; color: black; font-weight: bold; border: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="stage">
    <div class="header-info">
        <div class="info-tag pin-tag" id="pinDisplay">PIN: Generating...</div>
        <div class="info-tag" id="dateTime">--:--:-- | --/--/--</div>
    </div>
    <video id="remoteVideo" autoplay playsinline></video>
    <div class="local-box"><video id="localVideo" autoplay playsinline muted></video></div>
</div>

<div class="controls">
    <button class="btn active" id="startBtn" onclick="initCall()"><i class="fa-solid fa-play"></i></button>
    <button class="btn" id="micBtn" onclick="toggleMic()"><i class="fa-solid fa-microphone"></i></button>
    <button class="btn gallery" onclick="document.getElementById('fileVideo').click()"><i class="fa-solid fa-film"></i></button>
    <button class="btn gallery" onclick="document.getElementById('fileImage').click()"><i class="fa-solid fa-image"></i></button>
    <button class="btn" onclick="switchCam()"><i class="fa-solid fa-camera-rotate"></i></button>
    <button class="btn" onclick="zoom(0.1)"><i class="fa-solid fa-plus"></i></button>
    <button class="btn" onclick="zoom(-0.1)"><i class="fa-solid fa-minus"></i></button>
    <button class="btn" onclick="move('up')"><i class="fa-solid fa-arrow-up"></i></button>
    <button class="btn" onclick="move('down')"><i class="fa-solid fa-arrow-down"></i></button>
    <button class="btn" onclick="move('left')"><i class="fa-solid fa-arrow-left"></i></button>
    <button class="btn" onclick="move('right')"><i class="fa-solid fa-arrow-right"></i></button>
    <button class="btn danger" onclick="endCall()"><i class="fa-solid fa-phone-slash"></i></button>
</div>

<input type="file" id="fileVideo" accept="video/*">
<input type="file" id="fileImage" accept="image/*">

<script>
// (Firebase Config same as before)
const firebaseConfig = {
  apiKey: "AIzaSyDPySuM4s7rn5DUruLC2rSvQUCmS8kX_Y8",
  authDomain: "mybankuk-97ee4.firebaseapp.com",
  databaseURL: "https://mybankuk-97ee4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mybankuk-97ee4",
  storageBucket: "mybankuk-97ee4.firebasedatabase.app",
  messagingSenderId: "319596962619",
  appId: "1:319596962619:web:cf5592872715584cd60d1e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const roomRef = db.ref('call_session/active_room');
let pc, localStream, currentFacing = 'user', scale = 1, posX = 0, posY = 0;

setInterval(() => {
    const now = new Date();
    document.getElementById('dateTime').innerText = now.toLocaleTimeString() + " | " + now.toLocaleDateString();
}, 1000);

async function initCall() {
    const pin = Math.floor(1000 + Math.random() * 9000);
    document.getElementById('pinDisplay').innerText = "PIN: " + pin;
    localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
    document.getElementById('localVideo').srcObject = localStream;
    await roomRef.set({ pin: pin, status: 'calling', created: Date.now() });
    setupWebRTC();
}

async function setupWebRTC() {
    pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
    pc.onicecandidate = e => e.candidate && roomRef.child('hostCand').push(e.candidate.toJSON());
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await roomRef.update({ offer: {sdp: offer.sdp, type: offer.type} });
    roomRef.child('answer').on('value', async s => {
        if(s.val() && !pc.currentRemoteDescription) await pc.setRemoteDescription(new RTCSessionDescription(s.val()));
    });
    roomRef.child('guestCand').on('child_added', s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
    document.getElementById('startBtn').style.display = 'none';
}

// ফাইল শেয়ার লজিক
document.getElementById('fileVideo').onchange = async (e) => {
    const file = e.target.files[0];
    const videoEl = document.createElement('video');
    videoEl.src = URL.createObjectURL(file);
    videoEl.muted = true; videoEl.play(); videoEl.loop = true;
    const stream = videoEl.captureStream();
    replaceTrack(stream.getVideoTracks()[0]);
};

document.getElementById('fileImage').onchange = async (e) => {
    const file = e.target.files[0];
    const img = new Image(); img.src = URL.createObjectURL(file);
    await img.decode();
    const canvas = document.createElement('canvas');
    canvas.width = 1280; canvas.height = 720;
    const ctx = canvas.getContext('2d');
    setInterval(() => ctx.drawImage(img, 0, 0, 1280, 720), 100);
    const stream = canvas.captureStream();
    replaceTrack(stream.getVideoTracks()[0]);
};

function replaceTrack(newTrack) {
    const sender = pc.getSenders().find(s => s.track.kind === 'video');
    sender.replaceTrack(newTrack);
    document.getElementById('localVideo').srcObject = new MediaStream([newTrack]);
}

function zoom(val) { scale += val; applyTransform(); }
function move(dir) {
    if(dir === 'up') posY -= 20; if(dir === 'down') posY += 20;
    if(dir === 'left') posX -= 20; if(dir === 'right') posX += 20;
    applyTransform();
}
function applyTransform() { document.getElementById('remoteVideo').style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`; }
async function switchCam() {
    const newStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: currentFacing = (currentFacing === 'user' ? 'environment' : 'user')}});
    replaceTrack(newStream.getVideoTracks()[0]);
}
function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('micBtn').classList.toggle('active'); }
function endCall() { roomRef.remove(); location.reload(); }
</script>
</body>
</html>
